spring.application.name=chatbot-salud

#conexion a mysql
spring.datasource.url=jdbc:mysql://localhost:3306/chatbot_salud_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource-driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show=true

logging.pattern.console=[%thread] %-5level: %logger - %msg%n

#configurar el nivel del log
logging.level.root=INFO

#cambiar el puerto de tomcat
#server.port=8080
spring.main.bannner-mode=off